<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CALCULATOR</title>
</head>
<body>
    <main>
        <span><span>bmi</span> calculator<span>
        <div class="inputs">
            <div class="gender-input">
                <label for="">Gender</label>
                <select name="" id="">
                    <option value="">--select your gender--</option>
                    <option value="option-gender">Male</option>
                    <option value="option-gender">Female</option>
                </select>
            </div>
            <div class="height-input">
                <label for="">Height</label>
                <div>
                    <input type="text">
                    <select name="" id="">
                        <option value="">CM</option>
                        <option value="">M</option>
                    </select>
                </div>
            </div>
            <div class="weight-input">
                <label for="">Height</label>
                <div>
                    <input type="text">
                    <select name="" id="">
                        <option value="">KG</option>
                        <option value="">LB</option>
                    </select>
                </div>
            </div>
            <div class="age-input">
                <label for="">Age</label>
                <input type="text" placeholder="Enter your age">
            </div>

        </div>
        <div>
            <span>moderate thinness</span>
            <span>Underweight</span>
            <span>Normal</span>
            <span>overweight</span>
            <span>obesity</span>
            <span>16</span>
            <span>17</span>
            <span>18.5</span>
            <span>25</span>
            <span>30</span>
            <input type="range">
            <span class="result-status">Normal</span>
            <span class="result-value">21.0 <span>BMI</span></span>
        </div>
        <div>
            <h3>BMI Range</h3>
            <span>Severely Underweight</span>
            <span>Underweight</span>
            <span>Normal</span>
            <span>overweight</span>
            <span>obesity</span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>





    </main>

    
</body>
</html>
